[alembic]
# Path to alembic migration scripts
script_location = alembic

# Add current directory to Python path
prepend_sys_path = .

# Database URL (overridden in env.py from settings)
# sqlalchemy.url = mysql+pymysql://root:Krish%40123@localhost:3306/marketbuddy


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
